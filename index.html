<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PointScape</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/5.6.2/maplibre-gl.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section
      class="splash-screen"
      id="app-splash"
      aria-label="PointScape presentation"
    >
      <div class="splash-content">
        <h1>PointScape</h1>
        <div class="splash-logos" aria-label="Institutional logos">
          <figure class="splash-logo-card">
            <img
              src="https://www.eii.ulpgc.es/sites/default/files/einginfor_h_c.svg"
              alt="Universidad de Las Palmas de Gran Canaria y Escuela de Ingeniería Informática"
            />
          </figure>
        </div>
      </div>
      <p class="splash-signature">José Miguel Santana Núñez · 2026</p>
    </section>
    <main class="map-shell" aria-label="PointScape map">
      <section class="institutional-panel" aria-label="Institutional and project links">
        <img
          class="institutional-logo"
          src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Logo_ULPGC_%282019%29.svg"
          alt="Universidad de Las Palmas de Gran Canaria"
        />
        <a
          class="github-link"
          href="https://github.com/amazingsmash/point-scape"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open PointScape project on GitHub"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M12 0.3C5.37 0.3 0 5.67 0 12.3c0 5.3 3.44 9.8 8.21 11.39 0.6 0.11 0.82-0.26 0.82-0.58 0-0.28-0.01-1.04-0.02-2.04-3.34 0.73-4.04-1.61-4.04-1.61-0.55-1.39-1.33-1.76-1.33-1.76-1.09-0.75 0.08-0.73 0.08-0.73 1.2 0.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 0.99 0.11-0.78 0.42-1.3 0.76-1.6-2.67-0.3-5.47-1.33-5.47-5.93 0-1.31 0.47-2.38 1.24-3.22-0.12-0.3-0.54-1.52 0.12-3.17 0 0 1.01-0.32 3.3 1.23 0.96-0.27 1.98-0.4 3-0.4s2.04 0.14 3 0.4c2.29-1.55 3.3-1.23 3.3-1.23 0.66 1.65 0.24 2.87 0.12 3.17 0.77 0.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92 0.43 0.37 0.82 1.1 0.82 2.22 0 1.6-0.01 2.9-0.01 3.3 0 0.32 0.22 0.69 0.83 0.57C20.56 22.1 24 17.6 24 12.3 24 5.67 18.63 0.3 12 0.3Z"
            />
          </svg>
        </a>
      </section>
      <section class="layer-panel" aria-labelledby="layers-title">
        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="menu-content"
        >
          <span class="menu-icon" aria-hidden="true"></span>
          <span id="layers-title">PointScape</span>
        </button>
        <div class="menu-content" id="menu-content" hidden>
          <details class="control-section" open>
            <summary>Base map</summary>
            <div class="control-section-body">
              <label class="layer-option">
                <input type="radio" name="base-layer" value="street" />
                <span>Street map</span>
              </label>
              <label class="layer-option">
                <input type="radio" name="base-layer" value="satellite" checked />
                <span>Satellite imagery</span>
              </label>
            </div>
          </details>

          <details class="control-section">
            <summary>Terrain and camera</summary>
            <div class="control-section-body">
              <label class="layer-option layer-option-toggle">
                <input type="checkbox" id="terrain-toggle" checked />
                <span>Terrain</span>
              </label>
              <label class="camera-control" for="pitch-control">
                <span>Pitch</span>
                <output id="pitch-value" for="pitch-control">0&deg;</output>
                <input
                  type="range"
                  id="pitch-control"
                  min="0"
                  max="85"
                  step="1"
                  value="0"
                />
              </label>
              <label class="camera-control" for="terrain-exaggeration-control">
                <span>Vertical exaggeration</span>
                <output id="terrain-exaggeration-value" for="terrain-exaggeration-control">1.0x</output>
                <input
                  type="range"
                  id="terrain-exaggeration-control"
                  min="1"
                  max="5"
                  step="0.1"
                  value="1"
                />
              </label>
            </div>
          </details>

          <details class="control-section">
            <summary>Point cloud</summary>
            <div class="control-section-body">
              <fieldset class="indexing-mode-control" aria-label="LAS indexing mode">
                <legend>LAS indexing</legend>
                <label>
                  <input
                    type="radio"
                    name="las-indexing-mode"
                    value="quadtree"
                  />
                  <span>QuadTree</span>
                </label>
                <label>
                  <input
                    type="radio"
                    name="las-indexing-mode"
                    value="m3no"
                    checked
                  />
                  <span>M3NO</span>
                </label>
              </fieldset>
              <label class="layer-option layer-option-toggle">
                <input type="checkbox" id="full-resolution-toggle" checked />
                <span>Full points when close</span>
              </label>
              <label class="layer-option layer-option-toggle">
                <input type="checkbox" id="block-bounds-toggle" />
                <span>Loaded node bounds</span>
              </label>
              <label class="layer-option layer-option-toggle">
                <input type="checkbox" id="block-details-toggle" />
                <span>Tile details</span>
              </label>
              <fieldset class="lod-control-group" aria-label="LOD parameters">
                <legend>LOD controls</legend>
                <label class="camera-control" for="lod-screen-diagonal-control">
                  <span>Screen threshold</span>
                  <output id="lod-screen-diagonal-value" for="lod-screen-diagonal-control">48 px</output>
                  <input
                    type="range"
                    id="lod-screen-diagonal-control"
                    min="12"
                    max="160"
                    step="1"
                    value="48"
                  />
                </label>
                <label class="camera-control" for="lod-hysteresis-control">
                  <span>LOD hysteresis</span>
                  <output id="lod-hysteresis-value" for="lod-hysteresis-control">10%</output>
                  <input
                    type="range"
                    id="lod-hysteresis-control"
                    min="0"
                    max="0.5"
                    step="0.01"
                    value="0.1"
                  />
                </label>
                <label class="numeric-control" for="tile-min-diagonal-control">
                  <span>Min node diagonal</span>
                  <input
                    type="number"
                    id="tile-min-diagonal-control"
                    min="1"
                    max="5000"
                    step="1"
                    value="100"
                  />
                  <small>m</small>
                </label>
                <label class="numeric-control" for="tile-max-depth-control">
                  <span>Max tree depth</span>
                  <input
                    type="number"
                    id="tile-max-depth-control"
                    min="1"
                    max="16"
                    step="1"
                    value="8"
                  />
                  <small>levels</small>
                </label>
              </fieldset>
              <label class="camera-control" for="point-offset-control">
                <span>Point cloud offset</span>
                <output id="point-offset-value" for="point-offset-control">2 m</output>
                <input
                  type="range"
                  id="point-offset-control"
                  min="0"
                  max="10"
                  step="0.5"
                  value="2"
                />
              </label>
              <label class="camera-control" for="point-size-control">
                <span>Point size</span>
                <output id="point-size-value" for="point-size-control">3 px</output>
                <input
                  type="range"
                  id="point-size-control"
                  min="1"
                  max="12"
                  step="0.5"
                  value="3"
                />
              </label>
            </div>
          </details>

          <details class="control-section">
            <summary>Visual effects</summary>
            <div class="control-section-body">
              <label class="camera-control" for="depth-bias-control">
                <span>Depth advantage</span>
                <output id="depth-bias-value" for="depth-bias-control">0.0020</output>
                <input
                  type="range"
                  id="depth-bias-control"
                  min="0"
                  max="0.01"
                  step="0.0001"
                  value="0.002"
                />
              </label>
            </div>
          </details>

          <details class="control-section" open>
            <summary>Point cloud stats</summary>
            <div
              class="stats-panel"
              id="point-cloud-stats"
              aria-live="polite"
            ></div>
          </details>

          <details class="control-section">
            <summary>LAS classifications</summary>
            <button
              class="secondary-button"
              id="randomize-classification-colors"
              type="button"
            >
              Randomize colors
            </button>
            <div
              class="classification-legend"
              id="classification-legend"
              aria-label="LAS classification color legend"
            ></div>
          </details>

          <label class="file-drop" id="las-drop" for="las-file">
            <span>Load LAS files</span>
            <small>Drop one or more .las files or click</small>
            <input type="file" id="las-file" accept=".las" multiple />
          </label>
          <button
            class="fly-button"
            id="fly-to-point-cloud"
            type="button"
            hidden
          >
            Fly To Point Cloud
          </button>
          <p class="file-status" id="las-status">No LAS point cloud loaded.</p>
        </div>
      </section>

      <div id="map" class="map" role="application">
        <p class="map-status" id="map-status">Loading map...</p>
      </div>
    </main>
    <script src="./script.js?v=45"></script>
  </body>
</html>
