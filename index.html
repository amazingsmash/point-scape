<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nube de puntos LAS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/5.6.2/maplibre-gl.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="map-shell" aria-label="Mapa de Las Palmas de Gran Canaria">
      <section class="layer-panel" aria-labelledby="layers-title">
        <h2 id="layers-title">Capas</h2>
        <fieldset>
          <legend>Mapa base</legend>
          <label class="layer-option">
            <input type="radio" name="base-layer" value="street" />
            <span>Callejero</span>
          </label>
          <label class="layer-option">
            <input type="radio" name="base-layer" value="satellite" checked />
            <span>Foto ortogr&aacute;fica</span>
          </label>
        </fieldset>
        <label class="layer-option layer-option-toggle">
          <input type="checkbox" id="terrain-toggle" checked />
          <span>Elevaciones</span>
        </label>
        <label class="camera-control" for="pitch-control">
          <span>Inclinaci&oacute;n</span>
          <output id="pitch-value" for="pitch-control">0&deg;</output>
          <input
            type="range"
            id="pitch-control"
            min="0"
            max="85"
            step="1"
            value="0"
          />
        </label>
        <label class="camera-control" for="terrain-exaggeration-control">
          <span>Exageraci&oacute;n vertical</span>
          <output id="terrain-exaggeration-value" for="terrain-exaggeration-control">1.0x</output>
          <input
            type="range"
            id="terrain-exaggeration-control"
            min="1"
            max="5"
            step="0.1"
            value="1"
          />
        </label>
        <label class="camera-control" for="point-offset-control">
          <span>Offset nube</span>
          <output id="point-offset-value" for="point-offset-control">2 m</output>
          <input
            type="range"
            id="point-offset-control"
            min="0"
            max="10"
            step="0.5"
            value="2"
          />
        </label>
        <label class="file-drop" id="las-drop" for="las-file">
          <span>Cargar LAS</span>
          <small>Arrastra un .las o haz clic</small>
          <input type="file" id="las-file" accept=".las" />
        </label>
        <button class="fly-button" id="fly-to-point-cloud" type="button">
          Fly To Point Cloud
        </button>
        <p class="file-status" id="las-status">Nube aleatoria inicial.</p>
      </section>

      <div id="map" class="map" role="application">
        <p class="map-status" id="map-status">Cargando mapa...</p>
      </div>
    </main>
    <script src="./script.js?v=17"></script>
  </body>
</html>
